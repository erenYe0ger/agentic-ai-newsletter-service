services:
  postgres:
    image: postgres:15
    container_name: agentic_postgres
    restart: always
    environment:
      POSTGRES_USER: tech_user
      POSTGRES_PASSWORD: tech_pass
      POSTGRES_DB: tech_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tech_user"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: