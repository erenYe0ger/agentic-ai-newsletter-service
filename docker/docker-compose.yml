version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: agentic_postgres
    restart: always
    environment:
      POSTGRES_USER: tech_user
      POSTGRES_PASSWORD: tech_pass
      POSTGRES_DB: tech_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: