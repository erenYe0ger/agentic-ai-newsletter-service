services:
  postgres:
    image: postgres:15
    container_name: agentic_postgres
    restart: always
    environment:
      POSTGRES_USER: tech_user
      POSTGRES_PASSWORD: tech_pass
      POSTGRES_DB: tech_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: ..
    container_name: agentic_newsletter_app
    depends_on:
      - postgres
    env_file:
      - ../.env
    command: python -u main.py
    restart: "no"

volumes:
  postgres_data: