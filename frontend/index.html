<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Newsletter</title>
    <link rel="icon" type="image/svg+xml" href="https://www.docker.com/wp-content/uploads/2022/03/Moby-logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
</head>
<body class="bg-[#0a0a0c] text-white h-screen overflow-hidden flex items-center justify-center">

    <div id="canvas-bg"></div>

    <div class="container relative z-10 flex flex-col items-center justify-center px-6 text-center h-full max-h-[850px]">
        
        <header class="mb-6 md:mb-10 w-full max-w-4xl">
            <h1 id="hero-title" class="text-4xl md:text-5xl font-bold tracking-tight mb-4 text-white">
                Agentic AI Newsletter Service
            </h1>
            
            <div class="h-16 md:h-20 flex items-center justify-center">
                <span id="typed-text" class="text-lg md:text-2xl text-slate-400 leading-relaxed font-medium"></span>
            </div>
        </header>

        <div id="main-card" class="glass rounded-[2rem] p-8 md:p-12 shadow-2xl w-full max-w-xl">
            <div class="mb-8">
                <h3 class="text-xl font-semibold mb-2">Subscribe to the Daily Feed</h3>
                <p class="text-slate-500 text-sm">Technical breakthroughs, summarized and ranked.</p>
            </div>

            <div class="space-y-4">
                <input id="email" type="email" 
                    placeholder="Enter your email" 
                    class="input-field"
                    onkeydown="if(event.key === 'Enter') subscribe()">
                
                <button id="sub-btn" onclick="subscribe()" class="submit-btn">
                    <span class="btn-text">Subscribe for free</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </div>
        <div class="mt-10 flex flex-col items-center animate-fade-in">
            <div class="glass-pill px-6 py-3 flex items-center gap-3">
                <span class="text-slate-400 text-sm font-medium">Want to see how the agents work?</span>
                <div class="h-4 w-[1px] bg-white/10 mx-1"></div>
                <a 
                    href="https://github.com/erenYe0ger/agentic-ai-newsletter-service"
                    target="_blank"
                    class="flex items-center gap-2 text-white hover:text-indigo-400 transition-all duration-300 group"
                >
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                    </svg>
                    <span class="text-sm font-semibold tracking-wide">Explore Source</span>
                    <svg class="w-3 h-3 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-container">
        <span id="toast-icon" class="font-bold text-lg"></span>
        <span id="toast-msg" class="text-sm font-semibold tracking-wide"></span>
    </div>

    <script>
        // Grayish Slate Fog Background
        VANTA.FOG({
            el: "#canvas-bg",
            mouseControls: true,
            touchControls: true,
            highlightColor: 0x4b5563, 
            midtoneColor: 0x1f2937,   
            lowlightColor: 0x111827,
            baseColor: 0x0a0a0c,      
            blurFactor: 0.7,
            speed: 1.8,
            zoom: 1.2
        });

        // Typewriter logic
        new Typed('#typed-text', {
            strings: [
                'Agents scan the internet for AI breakthroughs.',
                'Research, startups, tools — automatically summarized.',
                'Ranked by relevance. Delivered daily.'
            ],
            typeSpeed: 40,
            backSpeed: 20,
            backDelay: 2000,
            loop: true,
            cursorChar: '_'
        });

        // Entrance Animations
        gsap.from("#hero-title", { opacity: 0, scale: 0.98, y: 15, duration: 1.2, ease: "power3.out" });
        gsap.from("#main-card", { opacity: 0, y: 25, duration: 1.2, delay: 0.5, ease: "expo.out" });

        async function subscribe() {
            const emailInput = document.getElementById("email");
            const btn = document.getElementById("sub-btn");
            const email = emailInput.value.trim();

            if (!email) {
                showToast("Something went wrong. Try again later.", "error");
                return;
            }

            // Disable button and show loading state
            btn.classList.add("loading");
            btn.disabled = true;

            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 5000);

            try {

                const res = await fetch(
                    "https://agentic-ai-newsletter-service.onrender.com/subscribe",
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email }),
                        signal: controller.signal
                    }
                );

                if (res.ok) {
                    showToast("Subscribed successfully!", "success");

                    setTimeout(() => {
                        showToast("Please check your inbox", "success");
                    }, 1000);

                    setTimeout(() => {
                        showToast("Starting the pipeline...", "success");
                    }, 2000);


                    emailInput.value = "";
                } else {
                    showToast("Subscription failed.", "error");
                }

            } catch (e) {

                showToast("Server unavailable.", "error");

            } finally {

                clearTimeout(timeout);
                btn.classList.remove("loading");
                btn.disabled = false;

            }
        }

        function showToast(text, type) {
            const toast = document.getElementById("toast");
            const msg = document.getElementById("toast-msg");
            const icon = document.getElementById("toast-icon");
            msg.innerText = text;
            icon.innerText = type === "success" ? "✓" : "✕";
            icon.className = type === "success" ? "text-green-400" : "text-red-400";
            toast.classList.add("active");
            setTimeout(() => toast.classList.remove("active"), 10000);
        }
    </script>
</body>
</html>
