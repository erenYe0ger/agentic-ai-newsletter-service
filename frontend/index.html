<!DOCTYPE html>
<html>
<head>
  <title>AI Tech Newsletter</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f6f6f6;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      width: 250px;
      margin-right: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #msg {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Subscribe to AI Tech Newsletter</h2>

  <input id="email" type="email" placeholder="Enter your email">

  <button onclick="subscribe()">Subscribe</button>

  <div id="msg"></div>
</div>

<script>

async function subscribe(){

  const email = document.getElementById("email").value

  const res = await fetch(
    "https://agentic-ai-newsletter-service.onrender.com/subscribe",
    {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({email})
    }
  )

  console.log("Response:", res)

  if(res.ok){
    document.getElementById("msg").innerText="Subscribed successfully!"
    document.getElementById("email").value=""
  } else{
    document.getElementById("msg").innerText="Something went wrong. Try again later."
  }

}

</script>

</body>
</html>
